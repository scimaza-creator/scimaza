<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screener GICS — Settori Globali</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#2A2A2A; --bg2:#1E1E1E; --bg3:#333333; --surface:#3A3A3A;
  --border:#4A2030; --border2:#555555; --text:#F0EDE8; --text2:#B8B0A8; --text3:#7A7068;
  --accent:#C4763A; --accent2:#E08898; --amaranto:#4A1828; --amaranto2:#6B2A3E;
  --blue:#185FA5; --gold:#C4A055; --green:#1D9E75;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.topbar {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:0 2rem; height:56px; display:flex; align-items:center;
  justify-content:space-between; position:sticky; top:0; z-index:200;
}
.topbar-left { display:flex; align-items:center; gap:1rem; }
.back-btn {
  font-size:11px; color:var(--accent); background:none; border:1px solid var(--border);
  border-radius:5px; padding:4px 10px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background .15s;
}
.back-btn:hover { background:var(--amaranto); }
.topbar-title { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:600; color:var(--text); }
.topbar-sub { font-size:11px; color:var(--text3); border-left:1px solid var(--border2); padding-left:1rem; margin-left:.5rem; }
.topbar-date { font-size:11px; color:var(--text3); font-family:'DM Mono',monospace; }

.summary {
  display:flex; gap:1.5rem; padding:.6rem 2rem;
  background:var(--amaranto); border-bottom:1px solid var(--amaranto2);
  font-size:11px; color:var(--accent2); align-items:center; flex-wrap:wrap;
}
.sdot { width:6px; height:6px; border-radius:50%; background:var(--accent2); display:inline-block; margin-right:.4rem; }
.slabel { color:rgba(224,136,152,.6); }

.controls {
  background:var(--bg2); border-bottom:1px solid var(--border2);
  padding:.75rem 2rem; display:flex; align-items:flex-end; gap:2rem; flex-wrap:wrap;
}
.cg { display:flex; flex-direction:column; gap:4px; }
.clabel { font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--text3); font-weight:500; }
.brow { display:flex; gap:4px; flex-wrap:wrap; }

.geo-tab {
  font-size:11px; padding:4px 12px; border-radius:4px; border:1px solid var(--border2);
  background:transparent; color:var(--text2); cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:500; transition:all .15s;
}
.geo-tab:hover { border-color:var(--accent); color:var(--text); }
.geo-tab.active { background:var(--amaranto); border-color:var(--amaranto2); color:var(--accent2); }

.iv-tab {
  font-size:11px; padding:4px 10px; border-radius:4px; border:1px solid var(--border2);
  background:transparent; color:var(--text2); cursor:pointer; font-family:'DM Mono',monospace; transition:all .15s;
}
.iv-tab:hover { border-color:var(--gold); color:var(--text); }
.iv-tab.active { background:#2E1A00; border-color:var(--gold); color:var(--gold); }

.nchip {
  font-size:10px; padding:3px 9px; border-radius:12px; border:1px solid var(--border2);
  background:transparent; color:var(--text3); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s;
}
.nchip:hover { color:var(--text); border-color:var(--text3); }
.nchip.active { background:var(--blue); border-color:var(--blue); color:#fff; }
.nchip.allchip.active { background:var(--amaranto); border-color:var(--amaranto2); color:var(--accent2); }

.main { padding:1.5rem 2rem 3rem; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(540px,1fr)); gap:1.25rem; }

.sector-card {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:8px; overflow:hidden; transition:border-color .2s,box-shadow .2s;
}
.sector-card:hover { border-color:var(--accent); box-shadow:0 4px 20px rgba(0,0,0,.4); }
.sector-card.hidden { display:none; }

.card-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:.6rem 1rem; border-bottom:1px solid var(--border2); background:var(--bg3);
}
.card-hl { display:flex; align-items:center; gap:.6rem; }
.cnum { font-family:'DM Mono',monospace; font-size:10px; color:var(--text3); background:var(--bg2); border:1px solid var(--border2); border-radius:3px; padding:1px 5px; }
.cname { font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:600; color:var(--text); }
.cnature { font-size:9px; text-transform:uppercase; letter-spacing:.1em; color:var(--text3); padding:2px 7px; border:1px solid var(--border2); border-radius:10px; }
.csel { font-size:10px; background:var(--bg2); border:1px solid var(--border2); border-radius:4px; color:var(--text2); padding:2px 5px; font-family:'DM Sans',sans-serif; cursor:pointer; }

.tv-wrap { width:100%; height:300px; background:#131722; position:relative; }
.tv-msg { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--text3); font-size:12px; font-family:'DM Mono',monospace; text-align:center; padding:1rem; }

.card-footer {
  padding:.5rem 1rem; display:flex; gap:.4rem; flex-wrap:wrap;
  border-top:1px solid var(--border2); background:var(--bg2); align-items:center;
}
.etf { font-size:9px; font-family:'DM Mono',monospace; padding:2px 7px; border-radius:3px; background:#1A1814; border:1px solid var(--border2); color:var(--text3); }
.etf.usa { border-color:#185FA5; color:#5BA3E8; }
.etf.eu  { border-color:#1D9E75; color:#52C99A; }
.etf.em  { border-color:#BA7517; color:#E8A840; }
.etf.gl  { border-color:#6B52C8; color:#A090E8; }
.cnote { margin-left:auto; font-size:9px; color:var(--text3); font-family:'DM Mono',monospace; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <button class="back-btn" onclick="history.back()">← Hub</button>
    <span class="topbar-title">Screener GICS</span>
    <span class="topbar-sub">11 Macro Settori · Benchmark Globali</span>
  </div>
  <span class="topbar-date" id="live-date"></span>
</div>

<div class="summary">
  <span><span class="sdot"></span><span class="slabel">Standard: </span>GICS — MSCI / S&P Global</span>
  <span><span class="sdot"></span><span class="slabel">Dati: </span>TradingView (15 min delay)</span>
  <span><span class="sdot"></span><span class="slabel">ETF: </span>UCITS per investitori EU</span>
  <span><span class="sdot"></span><span class="slabel">Settori: </span>11 macro · 24 Industry Groups</span>
</div>

<div class="controls">
  <div class="cg">
    <span class="clabel">Area geografica globale</span>
    <div class="brow">
      <button class="geo-tab active" onclick="setGeo('USA',this)">🇺🇸 USA</button>
      <button class="geo-tab" onclick="setGeo('EU',this)">🇪🇺 Europa</button>
      <button class="geo-tab" onclick="setGeo('APAC',this)">🌏 Asia-Pacific</button>
      <button class="geo-tab" onclick="setGeo('EM',this)">🌍 Emergenti</button>
      <button class="geo-tab" onclick="setGeo('WORLD',this)">🌐 Globale</button>
    </div>
  </div>
  <div class="cg">
    <span class="clabel">Intervallo globale</span>
    <div class="brow">
      <button class="iv-tab" onclick="setRange('1',this)">1D</button>
      <button class="iv-tab active" onclick="setRange('W',this)">1W</button>
      <button class="iv-tab" onclick="setRange('M',this)">1M</button>
      <button class="iv-tab" onclick="setRange('3M',this)">3M</button>
      <button class="iv-tab" onclick="setRange('12M',this)">1Y</button>
    </div>
  </div>
  <div class="cg">
    <span class="clabel">Natura settore</span>
    <div class="brow">
      <button class="nchip allchip active" onclick="filterN('all',this)">Tutti</button>
      <button class="nchip" onclick="filterN('Manifatturiero',this)">Manifatturiero</button>
      <button class="nchip" onclick="filterN('Servizi',this)">Servizi</button>
      <button class="nchip" onclick="filterN('Infrastrutture',this)">Infrastrutture</button>
      <button class="nchip" onclick="filterN('Misto',this)">Misto</button>
    </div>
  </div>
</div>

<div class="main"><div class="grid" id="grid"></div></div>

<script>
var SECTORS = [
  { id:1,  name:"Energy",                 nature:"Manifatturiero",
    sym:{ USA:"AMEX:XLE",  EU:"XETR:EXH1", APAC:"TSE:1615",   EM:"AMEX:EEM",  WORLD:"AMEX:IXC"  },
    etf:[{l:"XLE",g:"usa"},{l:"EXH1",g:"eu"},{l:"iShares Global Energy",g:"gl"},{l:"MSCI EM Energy",g:"em"}],
    note:"Petrolio · gas · raffinerie · rinnovabili" },
  { id:2,  name:"Materials",              nature:"Manifatturiero",
    sym:{ USA:"AMEX:XLB",  EU:"XETR:EXV1", APAC:"TSE:1615",   EM:"AMEX:EEM",  WORLD:"AMEX:MXI"  },
    etf:[{l:"XLB",g:"usa"},{l:"EXV1",g:"eu"},{l:"iShares Global Materials",g:"gl"},{l:"MSCI EM Materials",g:"em"}],
    note:"Chimica · metalli · minerali · packaging" },
  { id:3,  name:"Industrials",            nature:"Misto",
    sym:{ USA:"AMEX:XLI",  EU:"XETR:EXV3", APAC:"TSE:1615",   EM:"AMEX:EEM",  WORLD:"AMEX:EXI"  },
    etf:[{l:"XLI",g:"usa"},{l:"EXV3",g:"eu"},{l:"iShares Global Industrials",g:"gl"},{l:"MSCI EM Industrials",g:"em"}],
    note:"Aerospazio · trasporti · logistica · macchinari" },
  { id:4,  name:"Consumer Discretionary", nature:"Misto",
    sym:{ USA:"AMEX:XLY",  EU:"XETR:EXV5", APAC:"TSE:1615",   EM:"AMEX:EEM",  WORLD:"AMEX:RXI"  },
    etf:[{l:"XLY",g:"usa"},{l:"EXV5",g:"eu"},{l:"iShares Global Cons. Disc.",g:"gl"},{l:"MSCI EM Cons. Disc.",g:"em"}],
    note:"Auto · lusso · retail · e-commerce · hotel" },
  { id:5,  name:"Consumer Staples",       nature:"Misto",
    sym:{ USA:"AMEX:XLP",  EU:"XETR:EXV4", APAC:"TSE:1615",   EM:"AMEX:EEM",  WORLD:"AMEX:KXI"  },
    etf:[{l:"XLP",g:"usa"},{l:"EXV4",g:"eu"},{l:"iShares Global Cons. Staples",g:"gl"},{l:"MSCI EM Staples",g:"em"}],
    note:"Alimentari · bevande · tabacco · distribuzione" },
  { id:6,  name:"Health Care",            nature:"Misto",
    sym:{ USA:"AMEX:XLV",  EU:"XETR:EXV6", APAC:"TSE:1615",   EM:"AMEX:EEM",  WORLD:"AMEX:IXJ"  },
    etf:[{l:"XLV",g:"usa"},{l:"EXV6",g:"eu"},{l:"iShares Global Healthcare",g:"gl"},{l:"MSCI EM Health Care",g:"em"}],
    note:"Farmaceutica · biotech · dispositivi medici" },
  { id:7,  name:"Financials",             nature:"Servizi",
    sym:{ USA:"AMEX:XLF",  EU:"XETR:EXV7", APAC:"TSE:1615",   EM:"AMEX:EEM",  WORLD:"AMEX:IXG"  },
    etf:[{l:"XLF",g:"usa"},{l:"EXV7",g:"eu"},{l:"iShares Global Financials",g:"gl"},{l:"MSCI EM Financials",g:"em"}],
    note:"Banche · assicurazioni · asset mgmt · fintech" },
  { id:8,  name:"Information Technology", nature:"Misto",
    sym:{ USA:"AMEX:XLK",  EU:"XETR:EXV2", APAC:"TSE:1615",   EM:"AMEX:EEM",  WORLD:"AMEX:IXN"  },
    etf:[{l:"XLK",g:"usa"},{l:"EXV2",g:"eu"},{l:"iShares Global IT",g:"gl"},{l:"MSCI EM IT",g:"em"}],
    note:"Software · hardware · semiconduttori · cloud" },
  { id:9,  name:"Communication Services", nature:"Servizi",
    sym:{ USA:"AMEX:XLC",  EU:"XETR:EXH4", APAC:"TSE:1615",   EM:"AMEX:EEM",  WORLD:"AMEX:IXP"  },
    etf:[{l:"XLC",g:"usa"},{l:"EXH4",g:"eu"},{l:"iShares Global Comm.",g:"gl"},{l:"MSCI EM Comm.",g:"em"}],
    note:"Telco · media · social · gaming · streaming" },
  { id:10, name:"Utilities",              nature:"Infrastrutture",
    sym:{ USA:"AMEX:XLU",  EU:"XETR:EXH7", APAC:"TSE:1615",   EM:"AMEX:EEM",  WORLD:"AMEX:JXI"  },
    etf:[{l:"XLU",g:"usa"},{l:"EXH7",g:"eu"},{l:"iShares Global Utilities",g:"gl"},{l:"MSCI EM Utilities",g:"em"}],
    note:"Elettricità · gas · acqua · rinnovabili" },
  { id:11, name:"Real Estate",            nature:"Infrastrutture",
    sym:{ USA:"AMEX:XLRE", EU:"XETR:EXI5", APAC:"TSE:1615",   EM:"AMEX:EEM",  WORLD:"AMEX:REET" },
    etf:[{l:"XLRE",g:"usa"},{l:"EXI5",g:"eu"},{l:"REET Global REIT",g:"gl"},{l:"MSCI EM Real Estate",g:"em"}],
    note:"REIT commerciali · residenziali · industriali" }
];

var gGeo = "USA", gRange = "W", gNature = "all";
var cardGeoMap = {}, cardRangeMap = {};

function geoLabel(g) {
  return {USA:"🇺🇸 USA",EU:"🇪🇺 EU",APAC:"🌏 APAC",EM:"🌍 EM",WORLD:"🌐 World"}[g] || g;
}

function renderGrid() {
  var grid = document.getElementById("grid");
  grid.innerHTML = SECTORS.map(function(s) {
    var geo = cardGeoMap[s.id] || gGeo;
    var opts = ["USA","EU","APAC","EM","WORLD"].map(function(g) {
      return "<option value='" + g + "'" + (geo===g?" selected":"") + ">" + geoLabel(g) + "</option>";
    }).join("");
    var etfs = s.etf.map(function(e) {
      return "<span class='etf " + e.g + "'>" + e.l + "</span>";
    }).join("");
    return "<div class='sector-card' id='sc-" + s.id + "' data-nature='" + s.nature + "'>" +
      "<div class='card-header'>" +
        "<div class='card-hl'>" +
          "<span class='cnum'>GICS " + String(s.id).padStart(2,"0") + "</span>" +
          "<span class='cname'>" + s.name + "</span>" +
          "<span class='cnature'>" + s.nature + "</span>" +
        "</div>" +
        "<select class='csel' onchange=\"onCardGeo(" + s.id + ",this.value)\">" + opts + "</select>" +
      "</div>" +
      "<div class='tv-wrap' id='tw-" + s.id + "'><div class='tv-msg'>Caricamento grafico…</div></div>" +
      "<div class='card-footer'>" + etfs + "<span class='cnote'>" + s.note + "</span></div>" +
    "</div>";
  }).join("");
  applyFilter();
  loadTV();
}

function loadTV() {
  if (window.TradingView) { buildWidgets(); return; }
  var s = document.createElement("script");
  s.src = "https://s3.tradingview.com/tv.js";
  s.onload = buildWidgets;
  s.onerror = function() {
    document.querySelectorAll(".tv-msg").forEach(function(el) {
      el.textContent = "⚠ TradingView non raggiungibile — carica il file su Netlify per vedere i grafici.";
    });
  };
  document.head.appendChild(s);
}

function buildWidgets() {
  SECTORS.forEach(function(s) {
    var geo = cardGeoMap[s.id] || gGeo;
    var range = cardRangeMap[s.id] || gRange;
    var sym = s.sym[geo] || s.sym["USA"];
    buildOne(s.id, sym, range);
  });
}

function buildOne(id, sym, range) {
  var wrap = document.getElementById("tw-" + id);
  if (!wrap) return;
  wrap.innerHTML = "";
  var div = document.createElement("div");
  div.id = "tvw-" + id;
  wrap.appendChild(div);
  try {
    new TradingView.widget({
      container_id: "tvw-" + id,
      symbol: sym,
      interval: range,
      width: "100%",
      height: 300,
      theme: "dark",
      style: "1",
      locale: "it",
      toolbar_bg: "#131722",
      enable_publishing: false,
      hide_side_toolbar: true,
      save_image: false
    });
  } catch(e) {
    wrap.innerHTML = "<div class='tv-msg'>Errore: " + e.message + "</div>";
  }
}

function onCardGeo(id, geo) {
  cardGeoMap[id] = geo;
  var s = SECTORS.find(function(x){return x.id===id;});
  var range = cardRangeMap[id] || gRange;
  buildOne(id, s.sym[geo] || s.sym["USA"], range);
}

function setGeo(geo, btn) {
  gGeo = geo;
  document.querySelectorAll(".geo-tab").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  cardGeoMap = {};
  renderGrid();
}

function setRange(range, btn) {
  gRange = range;
  document.querySelectorAll(".iv-tab").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  cardRangeMap = {};
  renderGrid();
}

function filterN(nature, btn) {
  gNature = nature;
  document.querySelectorAll(".nchip").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  applyFilter();
}

function applyFilter() {
  document.querySelectorAll(".sector-card").forEach(function(card) {
    card.classList.toggle("hidden", gNature !== "all" && card.dataset.nature !== gNature);
  });
}

function updateDate() {
  var d = new Date();
  document.getElementById("live-date").textContent =
    d.toLocaleDateString("it-IT",{weekday:"short",day:"2-digit",month:"short",year:"numeric"}) +
    " · " + d.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
}
updateDate();
window.setInterval(updateDate, 60000);

renderGrid();
</script>
</body>
</html>
